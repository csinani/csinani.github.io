<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Kid Visual Schedule</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app">
    <section class="topbar">
      <div>
        <p id="kidName" class="top-title">Schedule</>
        <h1 id="kidName">SCHEDULE</h1>
        <p id="dayType">Loading…</p>
      </div>
      <button id="speakButton" class="icon-button" aria-label="Hear schedule">🔊</button>
    </section>

    <section id="nowCard" class="now-card">
      <div class="now-label">Now</div>
      <div id="nowIcon" class="now-icon">🌞</div>
      <div id="nowTitle" class="now-title">Good morning</div>
      <div id="nowHint" class="now-hint">Tap the big picture when you finish.</div>
      <button id="completeButton" class="complete-button">✅ I did it</button>
    </section>

    <section>
      <h2 class="section-title">Today</h2>
      <div id="taskList" class="task-list"></div>
    </section>

    <section id="doneScreen" class="done-screen hidden">
      <div class="party">🎉</div>
      <h2>All done!</h2>
      <p id="doneMessage">Great job!</p>
      <button id="resetButton" class="small-button">Reset today</button>
    </section>
  </main>

  <script src="schedule.js"></script>
</body>
</html>
